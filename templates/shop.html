{% extends "base.html" %}
{% block content %}
<div class="text-center mb-10">
    <h1 class="text-4xl font-extrabold text-gray-900">The Hardware Store</h1>
    <p class="mt-4 text-xl text-gray-500">Buy high-performance tech. Checkout triggers heavy load.</p>
</div>

<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
    {% for item in items %}
    <div
        class="bg-white rounded-lg shadow-lg overflow-hidden border border-gray-200 hover:shadow-xl transition-shadow duration-300">
        <div class="p-6">
            <h3 class="text-lg font-bold text-gray-900">{{ item.name }}</h3>
            <p class="text-gray-600 mt-2 text-sm h-10">{{ item.desc }}</p>
            <div class="mt-4 flex justify-between items-center">
                <span class="text-2xl font-bold text-blaze">${{ item.price }}</span>
                <button onclick='addToCart({{ item|tojson }})'
                    class="bg-gray-900 hover:bg-gray-800 text-white font-bold py-2 px-4 rounded transition-colors duration-200">
                    Add +
                </button>
            </div>
        </div>
    </div>
    {% endfor %}
</div>

<script>
    function addToCart(item) {
        let cart = JSON.parse(localStorage.getItem('blazeCart')) || [];
        cart.push(item);
        localStorage.setItem('blazeCart', JSON.stringify(cart));
        updateBadge();

        // Simple visual feedback
        const btn = event.target;
        const originalText = btn.innerText;
        btn.innerText = "Added!";
        btn.classList.add('bg-green-600');
        setTimeout(() => {
            btn.innerText = originalText;
            btn.classList.remove('bg-green-600');
        }, 1000);
    }
</script>
{% endblock %}
